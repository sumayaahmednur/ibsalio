<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.dataset.theme = 'dark'
          } else {
            document.documentElement.dataset.theme = 'light'
          }
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ibsa Aliyi Usmane — executive portfolio: food systems, climate economics, policy, leadership, and selected projects."
    />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Ibsa Aliyi Usmane | Executive portfolio</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
